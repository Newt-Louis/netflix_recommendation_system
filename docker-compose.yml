# Netflix-like Recommendation Big Data Lab
# 5 containers: Hadoop NameNode, Hadoop DataNode, Spark Master, Spark Worker, Notebook + TensorFlow CPU
# Resource budget: 6 CPU cores, 10GB RAM, 40GB disk.

services:
  namenode:
    image: apache/hadoop:3.4.3
    container_name: netflix-namenode
    hostname: namenode
    restart: "no"
    user: "0:0"
    command:
      [
        "bash",
        "-lc",
        "mkdir -p /hadoop/dfs/name /hadoop/tmp && chmod -R 755 /hadoop && if [ ! -f /hadoop/dfs/name/current/VERSION ]; then hdfs namenode -format -force -nonInteractive; fi && hdfs namenode"
      ]
    env_file:
      - ./hadoop.env
    environment:
      ENSURE_NAMENODE_DIR: "/hadoop/dfs/name"
    ports:
      - "9870:9870"
      - "8020:8020"
    volumes:
      - namenode_data:/hadoop/dfs/name
    networks:
      - netflix_bigdata_net
    mem_limit: 768m
    cpus: "0.50"
    

  datanode:
    image: apache/hadoop:3.4.3
    container_name: netflix-datanode
    hostname: datanode
    restart: "no"
    user: "0:0"
    command:
      [
        "bash",
        "-lc",
        "mkdir -p /hadoop/dfs/data && chmod -R 755 /hadoop/dfs/data && hdfs datanode"
      ]
    env_file:
      - ./hadoop.env
    depends_on:
      - namenode
    ports:
      - "9864:9864"
    volumes:
      - datanode_data:/hadoop/dfs/data
    networks:
      - netflix_bigdata_net
    mem_limit: 1536m
    cpus: "1.00"
    

  spark-master:
    image: spark:3.5.8-python3
    container_name: netflix-spark-master
    hostname: spark-master
    restart: "no"
    user: "0:0"
    command: >
      bash -lc "
      mkdir -p /opt/spark/work &&
      chmod -R 777 /opt/spark/work &&
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
      --host spark-master
      --port 7077
      --webui-port 8080
      "
    depends_on:
      - namenode
      - datanode
    ports:
      - "8080:8080"   # Spark Master Web UI
      - "7077:7077"   # Spark Master RPC
    volumes:
      - spark_master_work:/opt/spark/work
    networks:
      - netflix_bigdata_net
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 768M

  spark-worker:
    image: spark:3.5.8-python3
    container_name: netflix-spark-worker
    hostname: spark-worker
    restart: "no"
    user: "0:0"
    environment:
      PYSPARK_PYTHON: python3
      PYSPARK_DRIVER_PYTHON: python3
    command: >
      bash -lc "
      mkdir -p /opt/spark/work &&
      chmod -R 777 /opt/spark/work &&
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
      --webui-port 8081
      --cores 2
      --memory 3g
      --work-dir /opt/spark/work
      "
    depends_on:
      - spark-master
    ports:
      - "8081:8081"   # Spark Worker Web UI
    volumes:
      - spark_worker_work:/opt/spark/work
      - ./data:/workspace/data
      - ./outputs:/workspace/outputs
    networks:
      - netflix_bigdata_net
    deploy:
      resources:
        limits:
          cpus: "2.50"
          memory: 4G
    

  notebook:
    build:
      context: .
      dockerfile: Dockerfile.notebook
    container_name: netflix-notebook-tf-cpu
    hostname: notebook
    restart: "no"
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      SPARK_MASTER_URL: spark://spark-master:7077
      HDFS_URI: hdfs://namenode:8020
      PYSPARK_PYTHON: python3
      PYSPARK_DRIVER_PYTHON: python3
      TF_CPP_MIN_LOG_LEVEL: "1"
      TF_ENABLE_ONEDNN_OPTS: "1"
    depends_on:
      - namenode
      - datanode
      - spark-master
      - spark-worker
    ports:
      - "8888:8888"   # JupyterLab
      - "4040:4040"   # Spark Application UI
      - "8501:8501"   # Optional Streamlit demo if used later
    volumes:
      - ./data:/workspace/data
      - ./notebooks:/workspace/notebooks
      - ./src:/workspace/src
      - ./outputs:/workspace/outputs
      - ./models:/workspace/models
    networks:
      - netflix_bigdata_net
    mem_limit: 3g
    cpus: "1.50"

networks:
  netflix_bigdata_net:
    driver: bridge

volumes:
  namenode_data:
  datanode_data:
  spark_master_work:
  spark_worker_work:
